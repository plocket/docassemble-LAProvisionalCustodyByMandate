  1. If the person can't find a notary should we prevent them from moving forward?
  1. One the court form, italicized text indicates a dynamic value. This text is italicised: the person(s) having parental authority. What is the variable? The number of people? The type of authority?
  1. Can we allow digital signatures?
  1. Can we remove gendered language where possible? (use "the child" instead of "him", etc.)
  1. "[this expiration date] or one year from date hereof, whichever period is shorter." - shall we replace with just a date that has the correct limitations, or keep the language, but pick the one that's shorter?
  1. "witnesses" - does the mandatary count as a witness? If not, if there's only one parent does there need to be another witness? If not, shall I change the noun based on how many parents are present?
  1. Does "appearer(s)" include the mandatary? If so, can we just make this plural. If not, shall I adjust the language based on the number of parents present.
