  1. Abortion, marriage, adoption, child-protection decisions disallowed?
  1. TX form mentions legal ramifications for leaving children for long time. In LA too?
  1. Is it required that the attorney-in-fact be 18 years old or older?
  1. Should birth certificates and such be copies or originals?
  1. What are valid forms of id (for notary)? And what is a link to more official information?
