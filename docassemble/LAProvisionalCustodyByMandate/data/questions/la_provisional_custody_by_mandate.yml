id: mandates
question: |
  % if parental_delegation_children.number_gathered() > 1:
  What decisions do you want ${ caregivers[0].name.full() } to make for your children?
  % else:
  What decisions do you want ${ caregivers[0].name.full() } to make for ${ parental_delegation_children[0].name.first }?
  % endif
subquestion: |
  You can choose what decisions ${ caregivers[0].name.full() } can make for your child.
  % if parental_delegation_children.number_gathered() > 1:
  There are some decisions ${ caregivers[0].name.full() } CANNOT make for your children. They are these ones:
  % else:
  There are some decisions ${ caregivers[0].name.full() } CANNOT make for ${ parental_delegation_children[0].name.first }. They are these ones:
  % endif
  
  - They cannot make decisions about marriage or adoption.
  - They cannot make decisions about abortion.
  - They cannot take away your rights as a parent of ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }.
  
  You have the right to cancel these permissions at any time.
fields:
  - "Which of these do you want ${ caregivers[0].name.full() } to decide for your children?": parental_delegation_mandates
    datatype: checkboxes
    none of the above: False
    choices:
      code: |
        parental_delegation_mandates_map
    show if:
      code: |
        parental_delegation_children.number_gathered() > 1
  - "Which of these do you want ${ caregivers[0].name.full() } to decide for ${ parental_delegation_children[0].name.first }?": parental_delegation_mandates
    datatype: checkboxes
    none of the above: False
    choices:
      code: |
        parental_delegation_mandates_map
    show if:
      code: |
        parental_delegation_children.number_gathered() <= 1
