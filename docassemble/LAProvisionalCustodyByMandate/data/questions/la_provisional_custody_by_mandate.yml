data: !!omap
  - medical: "Consent to and authorize such medical care, treatment, or surgery as may be necessary for the health, safety, and welfare of ${ comma_and_list( parental_delegation_children ) }"
  - education: "Enroll ${ comma_and_list( parental_delegation_children ) } in the schools or other educational institutions they need for their proper education."
  - discipline: "Reasonably discipline ${ comma_and_list( parental_delegation_children ) } if necessary for their proper rearing, supervision, and training."
  - general: "Do other actions needed to shelter, support, and generally care for the welfare of ${ comma_and_list( parental_delegation_children ) }."
---
id: parental delegation dates
continue button field: parental_delegation_dates
check in: calc_max_delegation_expiry
question: |
  Start and end dates
subquestion: |
  When you see the notary you will have to use a pen to write the start and end dates for ${ caregivers[0].name.full() }'s permission to make decisions. If you answer these questions we will make a document for you that will remind you about those dates. You can skip this question and decide later.

  You must sign this document on the start date.

  ${ caregivers[0].name.full() } can have permission to make decisions for ${ comma_and_list( parental_delegation_children ) } for up to 1 year.
fields:
  - "Do you want to pick dates now or later?": decide_delegation_dates_later
    required: False
    default: False
    datatype: radio
    choices:
      - Now: False
      - Later: True
  - "When will you sign this document so ${ caregivers[0].name.full() } can start making decisions?": delegation_start_date
    required: False
    datatype: ThreePartsDate
    alMin: ${ today().format('MM/dd/yyyy') }
    hide if: decide_delegation_dates_later
  - note: |
      [TARGET delegation_expiry_help]
    hide if: decide_delegation_dates_later
  - "When do you want ${ caregivers[0].name.full() } to stop making decisions?": delegation_end_date
    # Never require even if "start" is answered. We will use what they give us.
    required: False
    datatype: ThreePartsDate
    alMin: ${ today().format('MM/dd/yyyy') }
    hide if: decide_delegation_dates_later
css: |
  <style>
    .datargetdelegation_expiry_help,
    .delegation_end_date_help {
      display: inline-block;
      height: fit-content;
      max-height: fit-content;
      margin-bottom: 0;
    }
  </style>
---
id: delegation expiry limits
event: calc_max_delegation_expiry
# Discuss: Use the same as AK form since military var doesn't interfere?
# `sets:` not required, but avoids confusing red text in editor
sets:
  - delegation_duration_rule
  - is_over_max_delegation_date
  - live_delegation_end
  - live_delegation_start
  - max_delegation_expiry
comment: |
  Language and flow possibilities:
  Previous page: "Do you want help figuring out your start and end dates for the delegation?"
  "Here is what your reminder will look like:"
code: |
  # How to show something different when the server is reloading but the user is seeing the same message? Need to detect checkin call or "change" event while on the page.
  
  import re

  def as_date_or_None( some_str ):
    """
    Return a valid date input string as a date, otherwise None
    Args:
      some_str (str) A string that may or may not be a valid date
    Returns:
      (DADateTime or None)
    """
    if not some_str:
      # Allow for input of None or empty string
      return None
    else:
      # If error, fail silently. Default messages are enough.
      try:
        if re.fullmatch(r'\d\d?/\d\d?/\d\d\d\d', some_str ):
          input_date = as_datetime( some_str )
          if str( input_date ) != 'Bad date':
            return input_date
      except Exception as err:
        return None
    return None
  

  # === Get input values ===

  live_delegation_start = as_date_or_None( action_argument('delegation_start_date') )
  live_delegation_end = as_date_or_None( action_argument('delegation_end_date') )

  # Defaults
  delegation_duration_rule = "a year after the start date"

  # Actual end date maximum vals if possible
  max_delegation_expiry = None
  if live_delegation_start != None:
    max_delegation_expiry = live_delegation_start.plus( years=1 )

  is_over_max_delegation_date = False
  try:
    if live_delegation_end > max_delegation_expiry:
      is_over_max_delegation_date = True
  except:
    pass

  max_delegation_expiry_msg
---
comment: |
  We need another field to make the user click off of the end date so they can see their validation message.

  `check in:` should have a `check in event/event type:`
target: delegation_expiry_help
template: max_delegation_expiry_msg
content: |
  % if live_delegation_end and max_delegation_expiry and is_over_max_delegation_date:
  <div class="delegation_end_date_help h-auto alert alert-warning" markdown=1>
  <i class="fa-solid fa-face-frown"></i> **WARNING**: You must pick an end date **on or before** ${ delegation_duration_rule }.
  % else:
  <div class="delegation_end_date_help h-auto alert alert-info" markdown=1>
  If you pick and end date, you must pick a date **on or before** ${ delegation_duration_rule }.
  % endif
  
  % if live_delegation_start:
  This permission will **start** on ${ live_delegation_start }, so you must **pick an end date on or before** ${ max_delegation_expiry }. You can also leave it blank.
  % endif
  
  </div>
---
