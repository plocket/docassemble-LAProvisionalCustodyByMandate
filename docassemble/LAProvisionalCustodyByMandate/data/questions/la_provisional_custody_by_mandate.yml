---
id: download la_provisional_custody_by_mandate_download plain
event: la_provisional_custody_by_mandate_download_plain
question: |
  All done! :face-smile:
subquestion: |
  Thank you, ${ comma_and_list( users ) }. Your document is ready to download at the bottom of the page. Here is what you need to do next.

  **Before you print the form:**
  
  1. [Look at the document at the bottom of the page](#documents) to make sure it is correct.
  1. Tap the "Edit answers" button to fix any mistakes.

  **Next steps:**

  % if other_delegation_parent_exists:
  1. Print 3 copies of the document.
  % else:
  1. Print 2 copies of the document.
  % endif
  1. Go to the [notary certified by Louisiana](https://courtformsonline.org/guides/finding-and-using-a-notary) or other person who has the power to take oaths.
  % if decide_delegation_dates_later == True:
  1. Write the dates when you want ${ caregivers[0].name.full() } to start making decisions and when you want them to stop. You can give them permission for up to 1 year.
  % else:
  1. Write the dates when you want ${ caregivers[0].name.full() } to start making decisions and when you want them to stop.
  % if not decide_delegation_dates_later and delegation_start_date:
  You said you wanted permission to start on **${ delegation_start_date }**.
  % endif
  % if not decide_delegation_dates_later and delegation_end_date:
  You said you wanted permission to **end on ${ delegation_end_date }**.
  % endif
  % endif
  1. Make sure you have filled out all the blank lines in the form.
  % if users.number_gathered() > 1:
  1. You, ${ users[1].name.full() }, and ${ caregivers[0].name.full() } should all sign all the documents in front of someone who can take oaths in Louisiana, like a notary.
  % else:
  1. You and ${ caregivers[0].name.full() } should both sign all the documents in front of someone who can take oaths in Louisiana, like a notary.
  % endif
  1. Have that person notarize and sign both documents.
  % if other_delegation_parent_exists:
  % if users.number_gathered() > 1:
  1. Give one signed document to ${ users[1].name.full() }.
  % else:
  1. Give one signed document to the other parent.
  % endif
  % endif
  1. Give one signed document to ${ caregivers[0].name.full() }.
  1. Keep the other document for your records.

  After that, ${ caregivers[0].name.full() } can show this document to prove they have permission to make decisions for ${ comma_and_list( parental_delegation_children ) }.

  You may also want to:
  
  :phone: Add ${ caregivers[0].name.full() } as an emergency contact with the schools, doctors, and childcare provider.[BR]
  :file-lines: Give ${ caregivers[0].name.full() } important documents, like birth certificates, insurance cards, and school or medical records.

  ---

  <div id="documents" style="display: hidden" aria-hidden="true"></div>
  
  ${ la_provisional_custody_by_mandate_bundle.download_list_html() }

  <p style="text-align: right;">
  ${ action_button_html(url_action('review_la_provisional_custody_by_mandate'), label=':pencil: Edit answers', color='info', size="md") }
  </p>

  ${ la_provisional_custody_by_mandate_bundle.send_button_html(show_editable_checkbox=True) }

progress: 100
---
# Bundles group the ALDocuments into separate downloads
objects:
  - la_provisional_custody_by_mandate_bundle: ALDocumentBundle.using(elements=[la_provisional_custody_by_mandate_next_steps, la_provisional_custody_by_mandate_attachment], filename="la_provisional_custody_by_mandate", title="All forms to download for your records", enabled=True)
  - al_recipient_bundle: ALDocumentBundle.using(elements=[la_provisional_custody_by_mandate_attachment],  filename="la_provisional_custody_by_mandate", title="All forms to file", enabled=True)
---
# ALDocument objects specify the metadata for each template
objects:
  - la_provisional_custody_by_mandate_next_steps: ALDocument.using(title="Next steps", filename="la_provisional_custody_by_mandate_next_steps.docx", enabled=True, has_addendum=False)
  - la_provisional_custody_by_mandate_attachment: ALDocument.using(title="Louisiana provisional custody by mandate", filename="la_provisional_custody_by_mandate", enabled=True, has_addendum=False, )
---
# Each attachment defines a key in an ALDocument that identifies its template.
# There are no signatures for this form, so the key is always "final"
attachment:
  name: Next steps
  filename: la_provisional_custody_by_mandate_next_steps
  docx template file: la_provisional_custody_by_mandate_next_steps.docx
  variable name: la_provisional_custody_by_mandate_next_steps[i]
  skip undefined: True
  tagged pdf: True
