  - Edit:
      - users[0].name.first
      - users[0].address.address
      - users[0].is_married
      - notary
      - follow up:
        - users[0].has_valid_id
        - users[1].has_valid_id
        - caregivers[0].has_valid_id
    button: |
      ### Your information
  - Edit: users[0].name.first
    button: |
      **Name**: ${ users[0].name.full() }
  - Edit: users[0].address.address
    button: |
      **Address**:[BR]${ users[0].address.block() }
  - Edit: users[0].is_married
    button: |
      **Married**: ${ users[0].is_married }
  - Edit:
      - notary
    button: |
      **Notarization**
      
      You plan to use a notary public or someone else who has the power to take oaths to notarize your documents.

      % if users[0].certification_next_steps:
      **To prepare to notarize your documents you plan to:**[BR]
      ${ users[0].certification_next_steps }
      % endif
  - Edit: users[0].has_valid_id
    show if: not users[0].needs_TF_835
    button: |
      **Your photo ID:**

      % if users[0].has_valid_id:
      You have a valid photo ID.
      
      % elif users[0].can_get_valid_id:
      You plan to find a valid photo ID.
      
      % else:
      You plan go to a notary public (or someone else who has the power to take oaths) without a valid photo ID.
      % endif

      % if users[0].valid_id_next_steps:
      **Your next steps to make sure you bring a valid photo ID:**[BR]
      ${ users[0].valid_id_next_steps }
      % endif

      ${ valid_forms_of_id }
  - note: |
      ---
  - Edit:
      - users[1].name.first
      - users[1].address.address
      - users[1].is_married
      - follow up:
        - users[1].has_valid_id
    button: |
      ### ${ users[1].name.full() }'s information
  - Edit: users[1].name.first
    button: |
      **Name**: ${ users[1].name.full() }
  - Edit: users[1].address.address
    button: |
      **Address**:[BR]${ users[1].address.block() }
  - Edit: users[1].is_married
    button: |
      **Married**: ${ users[1].is_married }
  - Edit: users[1].has_valid_id
    button: |
      **${ users[1].name.full() }'s photo ID:**

      % if users[1].has_valid_id:
      ${ users[1].name.full() }'s has a valid photo ID.
      
      % elif users[1].can_get_valid_id:
      You plan to find ${ users[1].name.full() }'s valid photo ID.
      
      % else:
      You plan go to a notary public (or someone else who has the power to take oaths) without a valid photo ID for ${ users[1].name.full() }.
      % endif

      % if users[1].valid_id_next_steps:
      **Your next steps to make sure ${ users[1].name.full() } brings a valid photo ID:**[BR]
      ${ users[1].valid_id_next_steps }
      % endif

      ${ valid_forms_of_id }
  - note: |
      ---
  - Edit:
      - caregivers[0].name.first
      - caregivers[0].is_major
      - caregivers[0].address.address
      - follow up:
        - caregivers[0].has_valid_id
    button: |
      ### ${ caregivers[0].name.full() }'s information
  - Edit: caregivers[0].name.first
    button: |
      **Name**: ${ caregivers[0].name.full() }
  - Edit: caregivers[0].is_major
    button: |
      **Over 18**: ${ caregivers[0].is_major }
  - Edit: caregivers[0].address.address
    button: |
      **Address**:[BR]${ caregivers[0].address.block() }
  - Edit: caregivers[0].has_valid_id
    button: |
      **${ caregivers[1].name.full() }'s photo ID:**

      % if caregivers[1].has_valid_id:
      ${ caregivers[1].name.full() }'s has a valid photo ID.
      
      % elif caregivers[1].can_get_valid_id:
      You plan to find ${ caregivers[1].name.full() }'s valid photo ID.
      
      % else:
      You plan go to a notary public (or someone else who has the power to take oaths) without a valid photo ID for ${ caregivers[1].name.full() }.
      % endif

      % if caregivers[1].valid_id_next_steps:
      **Your next steps to make sure ${ caregivers[1].name.full() } brings a valid photo ID:**[BR]
      ${ caregivers[1].valid_id_next_steps }
      % endif

      ${ valid_forms_of_id }
  - note: |
      ---
